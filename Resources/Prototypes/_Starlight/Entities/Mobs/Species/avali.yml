# CS - Why do we need ColorBird again?

- type: entity
  save: false
  name: Urist McAvali
  # CS - None of these parent exist
  id: BaseMobAvali
  parent: BaseMobHuman # CS - Inherit from BaseMobHuman
  abstract: true
  components:
  # CS - No language system
  # CS - No Thirst Tag
  - type: HumanoidAppearance
    species: Avali
    hideLayersOnEquip:
    - Tail
    - HeadTop
  # CS Start - Use Needs
  - type: Needs
    needs:
    - NeedHungerDefault
    - NeedThirstDefault
  # End CS
    baseDecayRate: 0.03
  - type: Icon
    sprite: _Starlight/Mobs/Species/Avali/parts.rsi
    state: full
  - type: Body
    prototype: Avali
    requiredLegs: 2
  - type: Inventory
    speciesId: avali
    displacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: _Starlight/Mobs/Species/Avali/displacement.rsi
            state: jumpsuit
      outerClothing:
        sizeMaps:
          32:
            sprite: _Starlight/Mobs/Species/Avali/displacement.rsi
            state: outerclothing
      shoes: # DM only for colored shoes!
        sizeMaps:
          32:
            sprite: _Starlight/Mobs/Species/Avali/displacement.rsi
            state: shoes
      head:
        sizeMaps:
          32:
            sprite: _Starlight/Mobs/Species/Avali/displacement.rsi
            state: head
      hand:
        sizeMaps:
          32:
            sprite: _Starlight/Mobs/Species/Avali/displacement.rsi
            state: hand
      back:
        sizeMaps:
          32:
            sprite: _Starlight/Mobs/Species/Avali/displacement.rsi
            state: back
      gloves:
        sizeMaps:
          32:
            sprite: _Starlight/Mobs/Species/Avali/displacement.rsi
            state: gloves
  - type: Butcherable
    butcheringType: Spike
    spawned:
    - id: FoodMeatChicken
      amount: 3
  - type: Speech
    speechVerb: Parrot # RMC did it right.
    speechSounds: MaleAvali
    # CS - Allow all emote
  - type: MobThresholds
    thresholds:
      0: Alive
      90: Critical
      180: Dead
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 95 #tiny
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: Vocal
    sounds:
      Male: MaleAvali
      Female: FemaleAvali
      Unsexed: MaleAvali
  - type: MovementSpeedModifier
    baseWeightlessAcceleration: 1.6 # Avalis are specifically built to fly in low-g environments
    baseWeightlessFriction: 1
    baseWeightlessModifier: 1
  - type: Damageable
  # CS Start - Port Temp + Damage modifier from Resomi
  - type: Temperature
    coldDamageThreshold: 195.4 # Goobstation - freezing point of ammonia is -77.75°C
    heatDamageThreshold: 320.15 # Goobstation - space chickens can't tolerate reasonable temperatures, but requiring them to stay icy would be cringe, so instead make their heat damage threshold dangerously close to standard atmos, at 47°C
    coldDamage:
      types:
        Cold: 0.05 #per second, scales with temperature & other constants
    heatDamage:
      types:
        Heat: 3 #per second, scales with temperature & other constants
    damageModifierSet: Resomi
  # End CS
  - type: DamageVisuals
    damageOverlayGroups:
      Brute:
        sprite: Mobs/Effects/brute_damage.rsi
        color: "#6C3BAA"
  - type: Bloodstream
    bloodReagent: AmmoniaBlood # CS - Avali are Ammonia based
  - type: MeleeWeapon
    soundHit:
      path: /Audio/Weapons/pierce.ogg
    angle: 30
    animation: WeaponArcClaw
    damage:
      types:
        Slash: 6.25
#  - type: Stasis
#    enterStasisAction: ActionStasisEnter
#    exitStasisAction: ActionStasisExit
#    updateInterval: 1s
#    healingPerUpdate:
#      types:
#        Heat: 2
#        Cold: 2
#      groups:
#        Brute: 6
#    bleedHealPerUpdate: 1.0
#    critHealingModifier: 0.5
#    stasisDamageReduction: 0.7

