- type: entity
  save: false
  name: Urist McAvali
  id: BaseMobAvali
  abstract: true
  components:
  - type: HumanoidAppearance
    species: Avali
    hideLayersOnEquip:
    - Tail
    - HeadTop

  - type: Tag
    tags:
    - CanPilot
    - FootstepSound
    - DoorBumpOpener
    - AnomalyHost
    - Avali
    - NotLabelable

  - type: Absorbable

  - type: Needs
    needs:
    - NeedHungerDefault
    - NeedThirstDefault

  - type: Thirst

  - type: Icon
    sprite: _Starlight/Mobs/Species/Avali/parts.rsi
    state: full

  - type: Body
    prototype: Avali
    requiredLegs: 2

  - type: Inventory
    speciesId: avali
    displacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: _Starlight/Mobs/Species/Avali/displacement.rsi
            state: jumpsuit
      outerClothing:
        sizeMaps:
          32:
            sprite: _Starlight/Mobs/Species/Avali/displacement.rsi
            state: outerclothing
      shoes:
        sizeMaps:
          32:
            sprite: _Starlight/Mobs/Species/Avali/displacement.rsi
            state: shoes
      head:
        sizeMaps:
          32:
            sprite: _Starlight/Mobs/Species/Avali/displacement.rsi
            state: head
      hand:
        sizeMaps:
          32:
            sprite: _Starlight/Mobs/Species/Avali/displacement.rsi
            state: hand
      back:
        sizeMaps:
          32:
            sprite: _Starlight/Mobs/Species/Avali/displacement.rsi
            state: back
      gloves:
        sizeMaps:
          32:
            sprite: _Starlight/Mobs/Species/Avali/displacement.rsi
            state: gloves

  - type: Butcherable
    butcheringType: Spike
    spawned:
    - id: FoodMeatChicken
      amount: 3

  - type: Speech
    speechVerb: Parrot
    speechSounds: MaleAvali

  - type: Vocal
    sounds:
      Male: MaleAvali
      Female: FemaleAvali
      Unsexed: MaleAvali

  - type: Hands
    handDisplacement:
      sizeMaps:
        32:
          sprite: _Starlight/Mobs/Species/Avali/displacement.rsi
          state: hand

  - type: MobThresholds
    thresholds:
      0: Alive
      90: Critical
      180: Dead

  - type: Fixtures
    fixtures:
      fix1:
        shape: !type:PhysShapeCircle
          radius: 0.35
        density: 95
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - MobLayer

  - type: Damageable
    damageContainer: Biological
    damageModifierSet: Avali

  - type: DamageVisuals
    damageOverlayGroups:
      Brute:
        sprite: Mobs/Effects/brute_damage.rsi
        color: "#6C3BAA"

  - type: Bloodstream # Goobstation - lore stuff
    bloodReagent: AmmoniaBlood

  - type: MeleeWeapon
    soundHit:
      path: /Audio/Weapons/pierce.ogg
    angle: 30
    animation: WeaponArcClaw
    damage:
      types:
        Slash: 6.25

  - type: MovementSpeedModifier
    baseWeightlessAcceleration: 1.6
    baseWeightlessFriction: 1
    baseWeightlessModifier: 1

  - type: TemperatureDamage
    heatDamageThreshold: 310
    coldDamageThreshold: 223

  - type: Temperature
    currentTemperature: 261
    specificHeat: 48

  - type: ThermalRegulator
    metabolismHeat: 400
    radiatedHeat: 100
    implicitHeatRegulation: 1500
    sweatHeatRegulation: 2000
    shiveringHeatRegulation: 2000
    normalBodyTemperature: 261
    thermalRegulationTemperatureThreshold: 1

  - type: TemperatureSpeed
    thresholds:
      250: 0.9
      230: 0.8
      223: 0.6

  - type: Stasis
    enterStasisAction: ActionStasisEnter
    exitStasisAction: ActionStasisExit
    updateInterval: 1s
    healingPerUpdate:
      types:
        Heat: 2
        Cold: 2
      groups:
        Brute: 6
    bleedHealPerUpdate: 1.0
    critHealingModifier: 0.5
    stasisDamageReduction: 0.7
