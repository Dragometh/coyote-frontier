- type: entity
  name: jet injector
  parent: BaseItem
  description: A sterile injector for convenient administration of drugs to patients.
  id: JetInjector
  components:
  - type: Sprite
    sprite: _DEN/Objects/Specific/Medical/jetinjector.rsi
    layers:
    - state: jetinjector_base
      map: [ "enum.SolutionContainerLayers.Base" ]
    - state: jetinjector_filled1
      map: [ "enum.SolutionContainerLayers.Fill" ]
      visible: false
  - type: Icon
    sprite: _DEN/Objects/Specific/Medical/jetinjector.rsi
    state: "jetinjector_base"
  - type: Appearance
  - type: SolutionContainerVisuals
    maxFillLevels: 6
    fillBaseName: jetinjector_filled
    solutionName: hypospray
  - type: Item
    sprite: _DEN/Objects/Specific/Medical/jetinjector.rsi
  - type: SolutionContainerManager
    solutions:
      hypospray:
        maxVol: 15
  - type: RefillableSolution
    solution: hypospray
  - type: ExaminableSolution
    solution: hypospray
  - type: Hypospray
    onlyAffectsMobs: false
    injectTime: 2.5
    injectMaxCapacity: true
    bypassBlockInjection: false
  - type: UseDelay
    delay: 0.5
  - type: StaticPrice
    price: 750
